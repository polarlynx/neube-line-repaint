name: Workflow feedback
description: Share friction, confusion, usability notes, or positive feedback.
title: "[Feedback] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this form for product and workflow feedback. Public issues should not include private artwork, personal information, or files you do not have permission to share.
  - type: dropdown
    id: workflow_area
    attributes:
      label: Workflow area
      options:
        - First launch
        - Importing images
        - Line extraction
        - Repaint controls
        - Editing on canvas
        - PNG export
        - PSD export
        - Website or documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What felt confusing, slow, fragile, or useful?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
  - type: input
    id: version
    attributes:
      label: NeuBE version
      placeholder: v0.1.1
