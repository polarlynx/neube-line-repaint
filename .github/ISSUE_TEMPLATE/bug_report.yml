name: Bug report
description: Report a reproducible line-art, image handling, export, or workflow issue.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid uploading private artwork, customer material, personal information, or files you do not have permission to share.
  - type: input
    id: version
    attributes:
      label: NeuBE version, if known
      placeholder: v0.1.x
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Import
        - Line extraction
        - Repaint
        - Export PNG
        - Export PSD
        - Canvas
        - Performance
        - Visual quality
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
  - type: textarea
    id: actual
    attributes:
      label: Actual result
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include logs or screenshots only if they are safe to share publicly.
