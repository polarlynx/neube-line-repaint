name: Bug report / 问题报告
description: Report an installation, activation, repaint, export, PSD, or canvas issue. / 反馈安装、授权、重绘、导出、PSD 或画布问题。
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid uploading private artwork, license certificates, Machine IDs, order screenshots, or customer material.

        感谢反馈问题。请不要上传私人素材、授权证书、Machine ID、订单截图或客户素材。
  - type: input
    id: version
    attributes:
      label: NeuBE version / 软件版本
      placeholder: v0.1.1
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version / Windows 版本
      placeholder: Windows 11 23H2
  - type: dropdown
    id: area
    attributes:
      label: Area / 问题区域
      options:
        - Install / 安装
        - Activation or license / 授权或证书
        - Import / 导入
        - Line extraction / 线稿提取
        - Repaint / 重绘
        - Export PNG / 导出 PNG
        - Export PSD / 导出 PSD
        - Canvas / 画布
        - Performance / 性能
        - Website / 官网
        - Other / 其他
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary / 简要描述
      description: What went wrong? / 发生了什么问题？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result / 期望结果
  - type: textarea
    id: actual
    attributes:
      label: Actual result / 实际结果
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / 诊断信息
      description: Include logs or screenshots only if they are safe to share publicly. / 仅在可公开分享时提供日志或截图。
