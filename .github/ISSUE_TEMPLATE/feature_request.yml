name: Feature request / 功能建议
description: Request a focused improvement or new capability. / 提出具体功能或改进建议。
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / 想解决的问题
      description: What workflow problem would this feature solve? / 这个功能想解决哪个流程问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal / 建议方案
      description: Describe the feature as concretely as possible. / 尽量具体描述你希望它如何工作。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / 其他方案
  - type: dropdown
    id: priority
    attributes:
      label: Priority / 优先级
      options:
        - Nice to have / 可有会更好
        - Important for repeated work / 对日常使用重要
        - Blocking my workflow / 阻塞当前流程
